services:
  - type: web
    name: trading-api
    env: node
    plan: starter
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reversal-data-db
          property: connectionString

  - type: worker
    name: yahoo-collector
    env: node
    plan: starter
    buildCommand: "npm install"
    startCommand: "node collector.js"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reversal-data-db
          property: connectionString

  - type: cron
    name: phase2-refresh
    env: node
    schedule: "*/5 * * * *"
    buildCommand: ""
    startCommand: "psql $DATABASE_URL -f db/schema_phase2.sql"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reversal-data-db
          property: connectionString

databases:
  - name: reversal-data-db
    plan: starter