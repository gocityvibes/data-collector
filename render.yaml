services:
  - type: web
    name: trading-api
    env: node
    buildCommand: 'npm install'
    startCommand: 'npm start'
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reversal-data-db
          property: connectionString
      - key: ADMIN_KEY
        sync: false
  - type: worker
    name: yahoo-collector
    env: node
    buildCommand: 'npm install'
    startCommand: 'node collector.js'
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reversal-data-db
          property: connectionString
  - type: cron
    name: phase2-refresh
    env: node
    schedule: '*/5 * * * *'
    buildCommand: 'npm install'
    startCommand: 'node db/schema_phase2.sql'
databases:
  - name: reversal-data-db
    plan: free