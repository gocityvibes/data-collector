services:
  - type: web
    name: phase1-collector
    env: node
    plan: starter
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reversal-data-db
          property: connectionString

databases:
  - name: reversal-data-db
    plan: starter

jobs:
  - type: cron
    name: phase2-apply-and-refresh
    schedule: "*/5 * * * *"   # every 5 minutes
    env: docker
    plan: starter
    buildCommand: ""
    startCommand: >
      psql $DATABASE_URL -f db/schema_phase2.sql &&
      psql $DATABASE_URL -c "REFRESH MATERIALIZED VIEW CONCURRENTLY training_fingerprints;"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reversal-data-db
          property: connectionString
