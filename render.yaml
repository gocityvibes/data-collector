services:
  - type: web
    name: phase2-backend
    env: node
    plan: starter
    buildCommand: "npm install && npm run db:phase2"
    startCommand: "npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: phase2-database
          property: connectionString

databases:
  - name: phase2-database
    plan: starter

jobs:
  - type: cron
    name: refresh-training-fingerprints
    schedule: "*/5 * * * *" # every 5 minutes
    env: docker
    plan: starter
    buildCommand: ""
    startCommand: >
      psql $DATABASE_URL -c "REFRESH MATERIALIZED VIEW CONCURRENTLY training_fingerprints;"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: phase2-database
          property: connectionString
